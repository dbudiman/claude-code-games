<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 24px;
      text-transform: uppercase;
      color: #e94560;
    }

    .scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 24px;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 12px 24px;
      border-radius: 10px;
      min-width: 80px;
    }

    .score-box .label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }

    .score-box .value {
      font-size: 2rem;
      font-weight: bold;
    }

    .score-box.x .value { color: #4caf50; }
    .score-box.o .value { color: #0f3460; color: #4fc3f7; }
    .score-box.draw .value { color: #aaa; }

    .status {
      font-size: 1.1rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
      height: 28px;
      color: #ccc;
    }

    .status span { font-weight: bold; }
    .status .x { color: #4caf50; }
    .status .o { color: #4fc3f7; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1e2d50;
      transform: scale(1.04);
    }

    .cell.x { color: #4caf50; }
    .cell.o { color: #4fc3f7; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.03); }

    #btn-restart {
      background: #4caf50;
      color: #fff;
    }

    #btn-reset-scores {
      background: #16213e;
      color: #aaa;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div class="scoreboard">
    <div class="score-box x">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">Draws</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div class="buttons">
    <button id="btn-restart">New Game</button>
    <button id="btn-reset-scores">Reset Scores</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus();
    }

    function setStatus(msg) {
      const el = document.getElementById('status');
      if (msg) { el.innerHTML = msg; return; }
      el.innerHTML = `Player <span class="${current}">${current}</span>'s turn`;
    }

    function checkWin(b, p) {
      return WINS.find(combo => combo.every(i => b[i] === p)) || null;
    }

    function handleClick(e) {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver) return;
      const idx = +cell.dataset.index;
      if (board[idx]) return;

      board[idx] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const winCombo = checkWin(board, current);
      if (winCombo) {
        winCombo.forEach(i =>
          document.querySelector(`[data-index="${i}"]`).classList.add('win')
        );
        scores[current]++;
        updateScores();
        setStatus(`Player <span class="${current}">${current}</span> wins!`);
        gameOver = true;
        return;
      }

      if (board.every(Boolean)) {
        scores.draw++;
        updateScores();
        setStatus('It\'s a draw!');
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus();
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.draw;
    }

    scores = { X: 0, O: 0, draw: 0 };
    init();

    document.getElementById('board').addEventListener('click', handleClick);
    document.getElementById('btn-restart').addEventListener('click', init);
    document.getElementById('btn-reset-scores').addEventListener('click', () => {
      scores = { X: 0, O: 0, draw: 0 };
      updateScores();
      init();
    });
  </script>
</body>
</html>
